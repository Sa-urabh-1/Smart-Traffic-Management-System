<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic AI | India Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    
    <style>
        :root {
            --bg-deep: #020617;
            --card-glass: rgba(15, 23, 42, 0.8);
            --primary: #3b82f6;
            --accent-red: #ef4444;
            --accent-green: #22c55e;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: #f8fafc;
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
        }

        /* --- AUTHENTICATION PAGE --- */
        #authPage {
            position: fixed; 
            inset: 0; 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            z-index: 9999;
        }

        .auth-card {
            background: var(--card-glass); 
            backdrop-filter: blur(20px);
            padding: 40px; 
            border-radius: 28px; 
            border: 1px solid rgba(255,255,255,0.1);
            width: 400px; 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid #334155; }
        
        .auth-tab { 
            flex: 1; 
            padding: 10px; 
            cursor: pointer; 
            color: #94a3b8; 
            font-weight: 600;
        }

        .auth-tab.active { 
            color: var(--primary); 
            border-bottom: 2px solid var(--primary); 
        }
        
        .input-group { margin-bottom: 15px; text-align: left; }
        
        .input-group label { 
            display: block; 
            font-size: 0.8rem; 
            margin-bottom: 5px; 
            color: #94a3b8; 
        }

        input {
            width: 100%; 
            padding: 12px; 
            background: rgba(0,0,0,0.2); 
            border: 1px solid #334155; 
            border-radius: 10px; 
            color: white; 
            outline: none;
        }

        input:focus { border-color: var(--primary); }

        /* --- SIDEBAR NAVIGATION --- */
        .sidebar {
            width: var(--sidebar-w); 
            background: rgba(2,6,23,0.95);
            border-right: 1px solid #1e293b; 
            padding: 25px; 
            display: flex; 
            flex-direction: column;
        }

        .nav-btn {
            background: transparent; 
            border: none; 
            color: #94a3b8;
            padding: 12px; 
            text-align: left; 
            border-radius: 12px;
            cursor: pointer; 
            font-weight: 600; 
            margin-bottom: 8px;
            display: flex; 
            align-items: center; 
            gap: 12px;
        }

        .nav-btn.active { background: rgba(59,130,246,0.1); color: var(--primary); }

        /* --- MAIN DASHBOARD LAYOUT --- */
        .main-content { flex: 1; padding: 25px; overflow-y: auto; position: relative; }
        
        .glass-card {
            background: var(--card-glass); 
            border: 1px solid #1e293b; 
            border-radius: 20px; 
            padding: 20px;
        }

        /* --- TRAFFIC SIGNAL LIGHTS --- */
        .light-box {
            background: #020617; 
            width: 70px; 
            padding: 15px; 
            border-radius: 35px;
            margin: 10px auto; 
            border: 3px solid #1e293b; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
        }

        .light { width: 40px; height: 40px; border-radius: 50%; background: #0f172a; }
        .light.red.active { background: var(--accent-red); box-shadow: 0 0 25px var(--accent-red); }
        .light.yellow.active { background: #eab308; box-shadow: 0 0 25px #eab308; }
        .light.green.active { background: var(--accent-green); box-shadow: 0 0 25px var(--accent-green); }

        /* --- MAP CONTAINER --- */
        #map { 
            height: 500px; 
            border-radius: 20px; 
            border: 1px solid #1e293b; 
            z-index: 1; 
        }
        
        /* --- EMERGENCY OVERLAY --- */
        .emergency-banner {
            display: none; 
            background: linear-gradient(90deg, rgba(239,68,68,0.2), transparent);
            border-left: 4px solid var(--accent-red); 
            padding: 15px; 
            border-radius: 8px;
            margin-bottom: 20px; 
            color: #fca5a5; 
            font-weight: 700;
        }

        /* --- BUTTONS --- */
        .btn { 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            cursor: pointer; 
            font-weight: 700; 
            width: 100%; 
            color: white;
        }

        .btn-primary { background: var(--primary); }
        
        .btn-emergency { 
            background: #ef4444; 
            margin-top: 10px; 
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
        }
        
        #logs { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        
        #logs li { 
            padding: 8px; 
            font-size: 0.85rem; 
            border-bottom: 1px solid #1e293b; 
            color: #94a3b8; 
            font-family: monospace;
        }

        /* --- ANIMATIONS --- */
        .amb-icon { animation: siren 0.4s infinite alternate; }
        @keyframes siren { 
            from { filter: drop-shadow(0 0 2px red); transform: scale(1); } 
            to { filter: drop-shadow(0 0 10px red); transform: scale(1.1); } 
        }

    </style>
</head>
<body>

    <div id="authPage">
        <div class="auth-card">
            <i class="fas fa-traffic-light" style="font-size: 3rem; color: var(--primary);"></i>
            <h2 style="margin: 15px 0;">SMART TRAFFIC MANAGEMENT</h2>
            
            <div class="auth-tabs">
                <div id="loginTab" class="auth-tab active" onclick="switchAuth('login')">Login</div>
                <div id="regTab" class="auth-tab" onclick="switchAuth('reg')">Register</div>
            </div>

            <div id="loginForm">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="userIn" placeholder="admin">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="passIn" placeholder="1234">
                </div>
                <button class="btn btn-primary" onclick="handleAuth('login')">Enter Command Center</button>
            </div>

            <div id="regForm" style="display:none;">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Officer Name">
                </div>
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" id="regUser" placeholder="Choose username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleAuth('reg')">Create Account</button>
            </div>
        </div>
    </div>

    <aside class="sidebar" style="display:none;" id="sidePanel">
        <h3 style="color:var(--primary); margin-bottom: 30px;"><i class="fas fa-shield-virus"></i> SMART TRAFFIC MANAGEMENT</h3>
        <button id="nav-home" class="nav-btn active" onclick="showPage('home')"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button id="nav-map" class="nav-btn" onclick="showPage('map')"><i class="fas fa-map-marked-alt"></i> Live Flow Map</button>
        <div style="margin-top:auto">
            <button class="btn" onclick="location.reload()" style="background:transparent; color:#ef4444; border: 1px solid #ef4444;">SHUTDOWN</button>
        </div>
    </aside>

    <main class="main-content" style="display:none;" id="mainPanel">
        <div id="emergencyBanner" class="emergency-banner">
            <i class="fas fa-radiation"></i> PRIORITY ALERT: AMBULANCE IN TRANSIT - ALL SIGNALS CLEAR
        </div>

        <div id="homePage">
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px;">
                <div class="glass-card"><small>NODE COUNT</small><h2 id="count">0</h2></div>
                <div class="glass-card"><small>SIGNAL STATUS</small><h2 id="signalText" style="color:var(--accent-red)">RED</h2></div>
                <div class="glass-card"><small>CONNECTIVITY</small><h2 style="color:var(--accent-green)">SECURE</h2></div>
                <div class="glass-card"><small>AI MODE</small><h2 id="mode">OPTIMIZED</h2></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1.5fr 1fr; gap: 20px;">
                <div class="glass-card">
                    <h3>Signal Core</h3>
                    <div class="light-box">
                        <div id="redLight" class="light red active"></div>
                        <div id="yellowLight" class="light yellow"></div>
                        <div id="greenLight" class="light green"></div>
                    </div>
                    <h1 id="timer" style="font-size:3.5rem; text-align:center; font-family: monospace;">05</h1>
                </div>

                <div class="glass-card">
                    <h3>Grid Injection</h3>
                    <div style="display:flex; gap:10px; margin-bottom:15px;">
                        <button class="btn btn-primary" onclick="addVehicle('car')"><i class="fas fa-car"></i> Add Car</button>
                        <button class="btn btn-primary" onclick="addVehicle('bus')"><i class="fas fa-bus-alt"></i> Add Bus</button>
                    </div>
                    <button class="btn btn-emergency" onclick="addVehicle('ambulance')"><i class="fas fa-ambulance"></i> PRIORITY AMBULANCE</button>
                    
                    <div style="margin-top:25px; padding-top: 20px; border-top: 1px solid #334155; display:flex; gap:10px;">
                        <button class="btn" onclick="running=true" style="background:#1e293b;">Resume</button>
                        <button class="btn" onclick="running=false" style="background:#1e293b;">Pause</button>
                        <button class="btn" onclick="resetSim()" style="background:transparent; border:1px solid #334155; color:#94a3b8">Purge Grid</button>
                    </div>
                </div>

                <div class="glass-card">
                    <h3>Live System Logs</h3>
                    <ul id="logs"></ul>
                </div>
            </div>

            <div class="glass-card" style="margin-top:20px; height: 260px;">
                <canvas id="trafficChart"></canvas>
            </div>
        </div>

        <div id="junctionPage" style="display:none">
            <div class="glass-card">
                <h3>Regional Geospatial Flow</h3>
                <div id="map"></div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
